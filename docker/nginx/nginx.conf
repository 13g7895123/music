server {
    listen 80;
    server_name _;

    # Docker 內建 DNS，動態解析
    resolver 127.0.0.11 valid=10s ipv6=off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # CodeIgniter 4 document root（供 fastcgi 使用）
    root /var/www/html/public;

    # ─── phpMyAdmin（MariaDB 管理工具，/pma/）─────────────────
    location /pma/ {
        set $upstream_pma http://phpmyadmin;
        proxy_pass         $upstream_pma/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ─── Backend API（CodeIgniter 4，php-fpm FastCGI）─────────
    location /api {
        set $backend backend:9000;
        include        fastcgi_params;
        fastcgi_pass   $backend;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  /var/www/html/public/index.php;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_param  PATH_TRANSLATED  /var/www/html/public/index.php;

        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
    }

    # ─── Frontend（Vue.js SPA）────────────────────────────────
    location / {
        set $upstream_frontend http://frontend;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
