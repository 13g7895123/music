server {
    listen 80;
    server_name _;

    # Docker 內部 DNS，啟用動態解析避免 upstream host not found
    resolver 127.0.0.11 valid=10s ipv6=off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ─── phpMyAdmin（MariaDB 管理工具，/pma/）─────────────────
    location /pma/ {
        set $upstream_pma http://phpmyadmin;
        proxy_pass         $upstream_pma/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ─── Backend API（CodeIgniter 4）─────────────────────────
    location /api {
        set $upstream_backend http://backend:8000;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffer_size     128k;
        proxy_buffers         4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ─── Frontend（Vue.js SPA）────────────────────────────────
    location / {
        set $upstream_frontend http://frontend;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
