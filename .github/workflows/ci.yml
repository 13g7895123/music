name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-dev --no-progress --optimize-autoloader

      - name: PHP syntax check
        working-directory: backend
        run: find app -name '*.php' -print0 | xargs -0 -n1 php -l | grep -v "No syntax errors" || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create env from example
        run: cp docker/envs/.env.development.example docker/.env

      - name: Validate compose config
        run: docker compose -f docker/docker-compose.yml --env-file docker/.env config --quiet
